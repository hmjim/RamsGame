name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev patch gettext libltdl-dev bison flex build-essential
          python3 -m pip install --upgrade pip
          python3 -m pip install buildozer cython==0.29.33

      - name: Build with Buildozer
        run: |
          set -o pipefail
          buildozer android debug 2>&1 | tee build_logs.txt
        id: buildozer

      - name: Debug: List files
        if: always()
        run: |
          echo "Checking for APK files..."
          find . -name "*.apk"
          ls -R bin/ || echo "bin/ directory not found"

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build_logs.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: |
            bin/*.apk
            .buildozer/android/platform/build-*/build/outputs/apk/**/*.apk
